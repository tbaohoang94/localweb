name: Tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "supabase/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "supabase/**"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Unit Tests ausfuehren
        run: npm run test

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        run: npm run test:coverage
        continue-on-error: true

  lint-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Prettier Check
        run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, lint-typecheck]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Next.js Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key

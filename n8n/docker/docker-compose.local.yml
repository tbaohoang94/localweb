# Lokales Overlay fuer MacBook-Entwicklung
# Wird mit dem Base-File gemerged: make up
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Ressourcenlimits damit Docker nicht das ganze System lahmlegt.
# Workflows laufen trotzdem — nur mit weniger Parallelitaet.

services:
  postgres:
    cpus: 0.5
    mem_limit: 256m

  n8n:
    cpus: 1.5
    mem_limit: 1g
    environment:
      # Task Runner — kleiner Heap reicht fuer lokale Entwicklung
      N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "384"

      # Weniger parallele Ausfuehrungen — schont CPU
      N8N_CONCURRENCY_PRODUCTION_LIMIT: "2"

      # Kuerzere Timeouts — lokal braucht man keine 30-Minuten-Jobs
      EXECUTIONS_TIMEOUT: "300"
      EXECUTIONS_TIMEOUT_MAX: "600"

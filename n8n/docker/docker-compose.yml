services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3

  autoheal:
    image: willfarrell/autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 180
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      N8N_COMMUNITY_PACKAGES: "@apify/n8n-nodes-apify"

      # Env-Vars in Expressions erlauben
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # URL-Konfiguration (lokal via .env steuerbar)
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      TZ: Europe/Berlin

      # Task Runner: External Mode — Broker lauscht auf 0.0.0.0 fuer Runner-Container
      N8N_RUNNERS_MODE: ${N8N_RUNNERS_MODE:-external}
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"

      # Code-Node: externe Module
      NODE_FUNCTION_ALLOW_EXTERNAL: apify-client,cheerio,puppeteer,puppeteer-core

      # Puppeteer
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"

      # Email / Notifications
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL}

      # --- Localweb Credentials ---

      # Supabase google-maps-lead-pipeline
      SUPABASE_GOOGLE_URL: ${SUPABASE_GOOGLE_URL}
      SUPABASE_GOOGLE_KEY: ${SUPABASE_GOOGLE_KEY}

      # Supabase close-sync
      SUPABASE_LEADS_URL: ${SUPABASE_LEADS_URL}
      SUPABASE_LEADS_KEY: ${SUPABASE_LEADS_KEY}

      # Apify
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Close CRM
      CLOSE_API_KEY: ${CLOSE_API_KEY}

      # DocuSeal
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY}

      # Demodesk
      DEMODESK_API_KEY: ${DEMODESK_API_KEY}
      DEMODESK_API_KEY_BRANTAN: ${DEMODESK_API_KEY_BRANTAN}
      DEMODESK_API_KEY_AMADEUS: ${DEMODESK_API_KEY_AMADEUS}
      DEMODESK_API_KEY_LILIAN: ${DEMODESK_API_KEY_LILIAN}
      DEMODESK_API_KEY_THOMAS: ${DEMODESK_API_KEY_THOMAS}
      DEMODESK_API_KEY_PETER: ${DEMODESK_API_KEY_PETER}

      # Google Drive
      GOOGLE_DRIVE_DEMODESK_FOLDER_ID: ${GOOGLE_DRIVE_DEMODESK_FOLDER_ID:-}

    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../close-crm-sync/files:/files
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Task Runner: Separater Container fuer Code-Node-Ausfuehrung
  # Verhindert 403-Auth-Race-Condition die bei Internal Mode auftritt
  n8n-runner:
    image: n8nio/runners:2.9.4
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_MAX_CONCURRENCY: 10
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: 300
      NODE_FUNCTION_ALLOW_EXTERNAL: apify-client,cheerio,puppeteer,puppeteer-core
      NODE_OPTIONS: "--max-old-space-size=1536"
    # Nur JS-Runner starten (Python nicht benoetigt)
    command: ["javascript"]

volumes:
  pg_data:
  n8n_data:
